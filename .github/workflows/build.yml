name: Build custom new-api

on:
  push:
    branches:
      - master
    paths:
      - "patches/**"
  schedule:
    # Runs daily at 00:00 UTC+8.
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Official upstream tag to build. Use alpha to build the latest upstream source. Leave empty to use the latest upstream tag."
        required: false
        type: string
      force_rebuild:
        description: "Rebuild and update the Release even if it already exists."
        required: false
        default: false
        type: boolean
      patch_mode:
        description: "Build with custom patches or upstream source only."
        required: true
        default: patched
        type: choice
        options:
          - patched
          - upstream

permissions:
  contents: write

env:
  UPSTREAM_REPOSITORY: QuantumNous/new-api

jobs:
  build:
    name: Static binaries (${{ matrix.build_target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_target: ${{ fromJSON(github.event_name == 'schedule' && '["stable","alpha"]' || github.event_name == 'push' && '["alpha"]' || '["manual"]') }}

    steps:
      - name: Check out builder repo
        uses: actions/checkout@v4

      - name: Resolve upstream version
        id: version
        env:
          INPUT_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag || '' }}
          INPUT_FORCE_REBUILD: ${{ github.event_name == 'push' && 'true' || github.event.inputs.force_rebuild || 'false' }}
          INPUT_PATCH_MODE: ${{ github.event.inputs.patch_mode || 'patched' }}
          BUILD_TARGET: ${{ matrix.build_target }}
        run: |
          set -euo pipefail

          PATCH_MODE="${INPUT_PATCH_MODE}"
          if [ "${PATCH_MODE}" != "patched" ] && [ "${PATCH_MODE}" != "upstream" ]; then
            echo "::error::Unsupported patch mode: ${PATCH_MODE}"
            exit 1
          fi

          MODE="stable"
          if [ "${BUILD_TARGET}" = "alpha" ] || [ "${INPUT_UPSTREAM_TAG}" = "alpha" ]; then
            MODE="alpha"
          fi

          if [ "${MODE}" = "alpha" ]; then
            DEFAULT_BRANCH="$(git ls-remote --symref "https://github.com/${UPSTREAM_REPOSITORY}.git" HEAD \
              | awk '/^ref:/ {sub("refs\/heads\/", "", $2); print $2; exit}')"
            if [ -z "${DEFAULT_BRANCH}" ]; then
              echo "::error::Unable to resolve upstream default branch"
              exit 1
            fi

            SOURCE_SHA="$(git ls-remote "https://github.com/${UPSTREAM_REPOSITORY}.git" "refs/heads/${DEFAULT_BRANCH}" \
              | awk '{print $1}')"
            if [ -z "${SOURCE_SHA}" ]; then
              echo "::error::Unable to resolve upstream ${DEFAULT_BRANCH} commit"
              exit 1
            fi

            SHORT_SHA="${SOURCE_SHA:0:6}"
            SOURCE_REF="${SOURCE_SHA}"
            VERSION="alpha-${SHORT_SHA}"
            RELEASE_TAG="alpha"
            RELEASE_NAME="${VERSION}"
          else
            if [ -n "${INPUT_UPSTREAM_TAG}" ]; then
              TAG="${INPUT_UPSTREAM_TAG}"
            else
              TAG="$(git ls-remote --tags --refs "https://github.com/${UPSTREAM_REPOSITORY}.git" \
                | awk -F/ '{print $3}' \
                | grep -Ev '(^nightly|alpha)' \
                | sort -V \
                | tail -n 1)"
            fi

            if [ -z "${TAG}" ]; then
              echo "::error::Unable to resolve upstream tag"
              exit 1
            fi

            SOURCE_REF="${TAG}"
            VERSION="${TAG}"
            RELEASE_TAG="${TAG}"
            RELEASE_NAME="${TAG}"
          fi

          if [ "${PATCH_MODE}" = "upstream" ]; then
            VERSION="upstream-${VERSION}"
            RELEASE_TAG="upstream-${RELEASE_TAG}"
            RELEASE_NAME="${VERSION}"
          fi

          echo "mode=${MODE}" >> "${GITHUB_OUTPUT}"
          echo "patch_mode=${PATCH_MODE}" >> "${GITHUB_OUTPUT}"
          echo "source_ref=${SOURCE_REF}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "force_rebuild=${INPUT_FORCE_REBUILD}" >> "${GITHUB_OUTPUT}"
          echo "MODE=${MODE}" >> "${GITHUB_ENV}"
          echo "PATCH_MODE=${PATCH_MODE}" >> "${GITHUB_ENV}"
          echo "SOURCE_REF=${SOURCE_REF}" >> "${GITHUB_ENV}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "${GITHUB_ENV}"
          echo "FORCE_REBUILD=${INPUT_FORCE_REBUILD}" >> "${GITHUB_ENV}"
          echo "Resolved upstream source: ${SOURCE_REF}"
          echo "Build version: ${VERSION}"
          echo "Patch mode: ${PATCH_MODE}"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Force rebuild: ${INPUT_FORCE_REBUILD}"

      - name: Check existing release
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${MODE}" = "alpha" ]; then
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
              CURRENT_RELEASE_NAME="$(gh release view "${RELEASE_TAG}" --json name --jq '.name')"
              if [ "${FORCE_REBUILD}" = "true" ]; then
                echo "skip=false" >> "${GITHUB_OUTPUT}"
                echo "Force rebuild enabled. Updating alpha release ${RELEASE_TAG}."
              elif [ "${CURRENT_RELEASE_NAME}" = "${RELEASE_NAME}" ]; then
                echo "skip=true" >> "${GITHUB_OUTPUT}"
                echo "Alpha release ${RELEASE_TAG} is already ${RELEASE_NAME}. Skipping build."
              else
                echo "skip=false" >> "${GITHUB_OUTPUT}"
                echo "Alpha release ${RELEASE_TAG} is ${CURRENT_RELEASE_NAME}. Updating to ${RELEASE_NAME}."
              fi
            else
              echo "skip=false" >> "${GITHUB_OUTPUT}"
              echo "Alpha release ${RELEASE_TAG} does not exist. Creating ${RELEASE_NAME}."
            fi
            exit 0
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            if [ "${FORCE_REBUILD}" = "true" ]; then
              echo "skip=false" >> "${GITHUB_OUTPUT}"
              echo "Force rebuild enabled. Updating release ${RELEASE_TAG}."
            else
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              echo "Release ${RELEASE_TAG} already exists. Skipping build."
            fi
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check out upstream source
        if: steps.release_check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ steps.version.outputs.source_ref }}
          path: source
          fetch-depth: 0

      - name: Apply custom patches
        if: steps.release_check.outputs.skip != 'true'
        working-directory: source
        run: |
          if [ "${PATCH_MODE}" = "upstream" ]; then
            echo "Skipping custom patches; building upstream source only."
            exit 0
          fi

          for patch in ../patches/*.patch; do
            echo "Checking ${patch}"
            git apply --check "${patch}"
            echo "Applying ${patch}"
            git apply "${patch}"
          done

          git diff --stat

      - name: Set up Bun
        if: steps.release_check.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        if: steps.release_check.outputs.skip != 'true'
        working-directory: source
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_REACT_APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN=true bun run build
          cd ../..

          cd web
          bun install --filter ./classic --frozen-lockfile
          cd classic
          bun run build
          cd ../..

      - name: Set up Go
        if: steps.release_check.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: source/go.sum

      - name: Build binaries
        if: steps.release_check.outputs.skip != 'true'
        working-directory: source
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GOFLAGS: "-trimpath -buildvcs=false"
        run: |
          mkdir -p dist
          go mod download

          build() {
            local goos="$1"
            local goarch="$2"
            local name="new-api-${goos}-${goarch}-${VERSION}"

            if [[ "$goos" == "linux" && "$goarch" == "amd64" ]]; then
              CGO_ENABLED=1 GOOS="$goos" GOARCH="$goarch" go build \
                -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=${VERSION}' -extldflags '-static'" \
                -o "dist/${name}"
              return
            fi

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=${VERSION}'" \
              -o "dist/${name}"
          }

          build linux amd64
          build linux arm64
          build darwin arm64

          sha256sum dist/new-api-* > dist/checksums.txt

      - name: Move alpha release tag
        if: steps.release_check.outputs.skip != 'true' && steps.version.outputs.mode == 'alpha'
        run: |
          git tag -f "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push -f origin "refs/tags/${RELEASE_TAG}"

      - name: Clean existing release assets
        if: steps.release_check.outputs.skip != 'true' && (steps.version.outputs.mode == 'alpha' || steps.version.outputs.force_rebuild == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} does not exist yet. No assets to clean."
            exit 0
          fi

          gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            if [ -z "${asset}" ]; then
              continue
            fi
            gh release delete-asset "${RELEASE_TAG}" "${asset}" --yes
          done

      - name: Resolve build time
        id: build_time
        if: steps.release_check.outputs.skip != 'true'
        run: |
          echo "value=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S UTC+8')" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        if: steps.release_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_name }}
          body: |
            Mode: ${{ steps.version.outputs.mode }}
            Patch Mode: ${{ steps.version.outputs.patch_mode }}
            Version: ${{ steps.version.outputs.version }}
            Upstream: ${{ env.UPSTREAM_REPOSITORY }}@${{ steps.version.outputs.source_ref }}
            Builder: ${{ github.repository }}@${{ github.sha }}
            Build Time: ${{ steps.build_time.outputs.value }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: source/dist/*
